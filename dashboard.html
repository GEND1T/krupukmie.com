<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - KrupukMie</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand"><i class="fas fa-store"></i> KrupukMie Hub</div>
        <li class="nav-item active" onclick="openOrdersView()"><i class="fas fa-shopping-bag"></i> Pesanan</li>
        <li class="nav-item" onclick="openProductsView()"><i class="fas fa-box"></i> Manajemen Produk</li>
        <a href="#" class="nav-item"><i class="fas fa-chart-line"></i> Laporan</a>
        <a href="#" class="nav-item"><i class="fas fa-cog"></i> Pengaturan</a>
        <li class="nav-item text-danger" onclick="logoutAdmin()" style="cursor: pointer; color: #EF4444; margin-top: 0px;">
            <i class="fas fa-sign-out-alt"></i> Keluar (Logout)
        </li>
    </div>

    <div class="main-content">
        <div class="topbar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button id="menuToggle" class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
                <h2 style="margin:0; font-size: 1.2rem; color: #1F2937;">Manajemen Pesanan</h2>
            </div>
            
            <div>
                <span class="admin-text" style="font-size: 0.9rem; color: #6B7280; margin-right: 15px; ">Admin</span>
                <i class="fas fa-user-circle" style="font-size: 1.5rem; color: #9CA3AF; vertical-align: middle;"></i>
            </div>
        </div>

        <div class="content-area">
            <div class="status-tabs" id="orderTabs">
                <button class="tab-btn active" data-status="all">Semua</button>
                <button class="tab-btn" data-status="pending">Belum Bayar</button>
                <button class="tab-btn" data-status="paid">Perlu Dikonfirmasi</button>
                <button class="tab-btn" data-status="processing">Diproses</button>
                <button class="tab-btn" data-status="shipped">Dikirim</button>
                <button class="tab-btn" data-status="completed">Selesai</button>
            </div>

            
            <div id="viewOrders">
                <div id="orderContainer"></div>
            </div>

            <div id="viewProducts" style="display: none; padding-top: 10px;">
                <div style="background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #E5E7EB; margin-bottom: 20px;">
                    <h2 style="color: #1F2937; margin-top: 0; font-size: 1.4rem;"><i class="fas fa-tags" style="color: #3B82F6; margin-right: 8px;"></i> Etalase Harga</h2>
                    <p style="color: #6B7280; font-size: 0.9rem; margin-bottom: 0;">Perubahan harga di sini akan langsung mengubah harga di halaman toko pembeli secara real-time.</p>
                </div>
                
                <div id="productsList"></div>
            </div>
        </div>

        </div>


        

    <script src="dashboard.js"></script>
</body>
</html>
