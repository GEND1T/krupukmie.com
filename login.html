<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KrupukMie Seller Center</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #F3F4F6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        .login-card h2 { color: #1F2937; margin-bottom: 5px; margin-top: 0; }
        .login-card p { color: #6B7280; font-size: 0.9rem; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: #4B5563; margin-bottom: 5px; font-weight: 600; }
        .input-group input { width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 6px; box-sizing: border-box; outline: none; transition: border 0.2s; }
        .input-group input:focus { border-color: #EF4444; }
        .btn-login { width: 100%; background: #EF4444; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; font-size: 1rem; margin-top: 10px; }
        .btn-login:hover { background: #DC2626; }
        .btn-login:disabled { background: #FCA5A5; cursor: not-allowed; }
        .error-msg { color: #EF4444; font-size: 0.85rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div style="background: #FEF2F2; color: #EF4444; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 15px auto;">
            <i class="fas fa-lock"></i>
        </div>
        <h2>Seller Center</h2>
        <p>Masuk untuk mengelola pesanan KrupukMie</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email Admin</label>
                <input type="email" id="email" required placeholder="admin@krupukmie.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login" id="btnLogin">Masuk Dashboard</button>
            <div class="error-msg" id="errorMsg">Email atau password salah!</div>
        </form>
    </div>

    <script>
        // Ganti dengan kredensial Supabase Anda
        const SUPABASE_URL = 'https://uomqqcntuniodhfbpxvh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvbXFxY250dW5pb2RoZmJweHZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDY5NTUsImV4cCI6MjA4ODM4Mjk1NX0.yO1lV5Qw-0U0HSRKlkASaL2Ol9qi6UJqzXfJFxKT7c0';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('errorMsg');

            btnLogin.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memverifikasi...';
            btnLogin.disabled = true;
            errorMsg.style.display = 'none';

            try {
                // Tembak API Auth Supabase
                const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email, password: password })
                });

                const data = await response.json();

                if (response.ok && data.access_token) {
                    // Jika sukses, simpan Token Rahasia ke Brankas Browser (Session Storage)
                    sessionStorage.setItem('krupukmie_admin_token', data.access_token);
                    
                    // Lemparkan masuk ke Dashboard!
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error(data.error_description || 'Gagal login');
                }
            } catch (error) {
                errorMsg.textContent = 'Email atau password salah!';
                errorMsg.style.display = 'block';
            } finally {
                btnLogin.innerHTML = 'Masuk Dashboard';
                btnLogin.disabled = false;
            }
        });
    </script>
</body>
</html>
